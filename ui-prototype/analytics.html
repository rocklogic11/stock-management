<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能分析 - 库存预备齐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; }
        
        .page-container { padding: 20px; }
        .page-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        
        .btn-group { margin-bottom: 20px; }
        .btn { display: inline-block; padding: 8px 16px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        .btn-secondary { background: #fff; color: #333; border: 1px solid #ddd; }
        .btn.active { background: #333; }
        
        .table { width: 100%; border-collapse: collapse; background: #fff; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .table th { background: #f9f9f9; font-weight: 600; }
        
        /* 区域切换 */
        .section { display: none; }
        .section.active { display: block; }
        
        /* 预警样式 */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="page-container">
        <h2 class="page-title">智能分析</h2>
        
        <!-- 按钮组（切换预警/建议） -->
        <div class="btn-group">
            <button class="btn active" onclick="showSection('warning')">库存预警</button>
            <button class="btn btn-secondary" onclick="showSection('suggestion')">进货建议</button>
        </div>
        
        <!-- 库存预警列表 -->
        <div id="warningSection" class="section active">
            <h3 style="margin-bottom: 15px;">库存预警列表</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>商品名称</th>
                        <th>当前库存</th>
                        <th>预警阈值</th>
                        <th>预警级别</th>
                        <th>建议进货量</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>蜘蛛侠模型玩偶</td>
                        <td>3</td>
                        <td>5</td>
                        <td><span class="badge badge-warning">一般预警</span></td>
                        <td>7</td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 5px 10px;">标记已处理</button>
                        </td>
                    </tr>
                    <tr>
                        <td>闪电麦昆模型汽车</td>
                        <td>0</td>
                        <td>3</td>
                        <td><span class="badge badge-danger">紧急预警</span></td>
                        <td>10</td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 5px 10px;">标记已处理</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 进货建议列表 -->
        <div id="suggestionSection" class="section">
            <h3 style="margin-bottom: 15px;">进货建议列表</h3>
            <table class="table">
                <thead>
                    <tr>
                        <th>商品名称</th>
                        <th>当前库存</th>
                        <th>日均销量</th>
                        <th>可售天数</th>
                        <th>建议进货量</th>
                        <th>建议进货金额</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>钢铁侠模型玩偶</td>
                        <td>15</td>
                        <td>2</td>
                        <td>7.5</td>
                        <td>5</td>
                        <td>¥600</td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 5px 10px;">调整</button>
                            <button class="btn" style="padding: 5px 10px;">生成入库单</button>
                        </td>
                    </tr>
                    <tr>
                        <td>蜘蛛侠模型玩偶</td>
                        <td>3</td>
                        <td>1.5</td>
                        <td>2</td>
                        <td>12</td>
                        <td>¥1,200</td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 5px 10px;">调整</button>
                            <button class="btn" style="padding: 5px 10px;">生成入库单</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        function showSection(sectionName) {
            // 隐藏所有区域
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
            
            // 显示选中的区域
            document.getElementById(sectionName + 'Section').classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
